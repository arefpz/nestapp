name: Bug report
description: Report something that is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not use this form for security
        issues — see SECURITY.md.

        **Tip:** In nestapp, click **Help → Copy Diagnostics to Clipboard**
        (or run `nestappDoctor` in MATLAB) and paste the result into the
        "Environment diagnostics" box below — it captures versions, plugins,
        and any detected problems automatically.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact steps, including the template/pipeline and any settings.
      placeholder: |
        1. Load template '...'
        2. Select files '...'
        3. Run Analysis
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error message / run log
      description: Paste the full MATLAB error or the run log. Will be rendered as code.
      render: text
    validations:
      required: false
  - type: textarea
    id: diagnostics
    attributes:
      label: Environment diagnostics
      description: Output of Help → Copy Diagnostics to Clipboard (or `nestappDoctor`).
      render: text
    validations:
      required: false
  - type: input
    id: nestapp-version
    attributes:
      label: nestapp version
      description: From Help → About, or run nestappVersion(). (Skip if you pasted diagnostics above.)
      placeholder: "1.0.0"
    validations:
      required: false
  - type: input
    id: matlab-version
    attributes:
      label: MATLAB version & OS
      placeholder: "R2025b, Windows 11"
    validations:
      required: true
  - type: textarea
    id: deps
    attributes:
      label: Dependency versions
      description: EEGLAB / TESA / FastICA versions if relevant.
      placeholder: "EEGLAB 2025.0.0, TESA 1.1.1, FastICA 2.5"
    validations:
      required: false
