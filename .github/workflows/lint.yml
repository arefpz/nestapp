name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  checkcode:
    # GitHub-hosted; no license needed for public repos. checkcode is base
    # MATLAB, so no extra toolboxes are required.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Static analysis (checkcode via tools/run_lint.m)
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(fullfile(getenv('GITHUB_WORKSPACE'), 'tools'));
            run_lint('error');
