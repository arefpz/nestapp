name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:

# Run JavaScript actions on Node 24 (silences the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-tests:
    # Runs on a free GitHub-hosted runner. matlab-actions installs MATLAB
    # with no license required for public repositories. The fast suite
    # (unit + regression) is designed to need no EEGLAB, so it runs here.
    # Integration tests require EEGLAB/TESA on disk and are run locally
    # (see .github/CONTRIBUTING.md): run_tests('all').
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          # Signal Processing is required (qa/ uses butter/filtfilt/pwelch,
          # exercised by the fast suite). Statistics is a declared requirement.
          # Parallel Computing backs runPipelineCore's parallel run path; the
          # serial fast suite does not exercise it, but it is installed so CI
          # matches the software's real dependency set. (Image Processing /
          # Wavelet / Optimization are NOT used by nestapp and are omitted.)
          products: >
            Signal_Processing_Toolbox
            Statistics_and_Machine_Learning_Toolbox
            Parallel_Computing_Toolbox

      - name: Run fast test suite (unit + regression)
        uses: matlab-actions/run-command@v2
        with:
          command: |
            cd(fullfile(getenv('GITHUB_WORKSPACE'), 'tests'));
            results = run_tests('fast');
            assert(~any([results.Failed]), 'run_tests: %d test(s) failed', sum([results.Failed]));
