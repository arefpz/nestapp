name: Docs

on:
  push:
    branches: ["develop"]
    tags: ["v*"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel an in-progress
# production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Run JavaScript actions on Node 24 (silences the Node 20 deprecation warning;
# some actions, e.g. matlab-actions, have no Node 24 release yet).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Generate API reference from source headers
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath(fullfile(getenv('GITHUB_WORKSPACE'), 'tools'));
            addpath(genpath(fullfile(getenv('GITHUB_WORKSPACE'), 'src')));
            gen_docs(fullfile(getenv('GITHUB_WORKSPACE'), 'site'));

      - name: Prepare Jekyll input
        run: |
          # Theme + relative-link rewriting (config lives with the site).
          cat > site/_config.yml <<'EOF'
          title: nestapp API reference
          description: Auto-generated from source headers - do not edit by hand.
          theme: jekyll-theme-cayman
          plugins:
            - jekyll-relative-links
          relative_links:
            enabled: true
          EOF
          # Include the hand-written architecture guide on the site.
          mkdir -p site/docs
          cp -f docs/architecture.md site/docs/ 2>/dev/null || true
          # Jekyll only renders Markdown that begins with a front-matter block;
          # prepend an empty one to every generated page that lacks it.
          find site -name '*.md' -print0 | while IFS= read -r -d '' f; do
            if ! head -n 1 "$f" | grep -q '^---$'; then
              { printf -- '---\n---\n'; cat "$f"; } > "$f.tmp" && mv "$f.tmp" "$f"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
